<div class="container mt-4">
  <h2 class="mb-4">User Management</h2>

  <!-- BOTÓN VOLVER -->
  <button class="btn btn-secondary mb-3" (click)="goBack()">← Back to Tasks</button>

  <!-- FORM -->
  <div class="card-custom mb-3">
    <h5 class="mb-3 fw-bold">Create User</h5>
    <div class="row g-2">
      <div class="col-md-5">
        <input class="form-control" [(ngModel)]="name" placeholder="Name" />
      </div>

      <div class="col-md-5">
        <input class="form-control" [(ngModel)]="email" placeholder="Email" />

        <small class="text-danger" *ngIf="email && !isValidEmail(email)"> Invalid email </small>
      </div>

      <div class="col-md-2">
        <button class="btn btn-magenta w-100" [disabled]="!name || !email" (click)="createUser()">
          Create
        </button>
      </div>
    </div>
  </div>

  <!-- LISTA -->
  <div
    *ngFor="let u of users"
    class="card-custom d-flex justify-content-between align-items-center"
  >
    <div>
      <h5 class="mb-1">{{ u.name }}</h5>
      <p class="text-muted mb-0">{{ u.email }}</p>
    </div>

    <button class="btn btn-danger btn-sm" (click)="askDelete(u.id)">Delete</button>
  </div>
</div>

<!-- MODAL ELIMINAR -->
<div *ngIf="userToDelete" class="modal-backdrop-custom">
  <div class="modal-custom">
    <h5>Confirm Delete</h5>
    <p>Are you sure you want to delete this user?</p>

    <!-- ERROR -->
    <p *ngIf="errorMessage" class="text-danger">
      {{ errorMessage }}
    </p>

    <div class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn btn-secondary" (click)="cancelDelete()">Cancel</button>

      <button class="btn btn-danger" (click)="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
