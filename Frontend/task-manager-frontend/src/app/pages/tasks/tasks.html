<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">Task Manager</h2>

    <button class="btn btn-violet px-4" routerLink="/users">Manage Users</button>
  </div>

  <!-- FILTRO -->
  <div class="mb-3">
    <select class="form-select w-auto" [(ngModel)]="filterStatus">
      <option value="">All</option>
      <option value="Pending">Pending</option>
      <option value="InProgress">In Progress</option>
      <option value="Done">Done</option>
    </select>
  </div>

  <!-- FORM -->
  <app-task-form (taskCreated)="loadTasks()"></app-task-form>

  <!-- LISTA -->
  <div *ngFor="let t of filteredTasks()" class="card-custom">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h5>{{ t.title }}</h5>
        <p class="mb-1 text-muted">{{ t.userName }}</p>
        <span class="badge bg-secondary">{{ t.status }}</span>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-violet" (click)="changeStatus(t.id, 'InProgress')">
          Start
        </button>

        <button class="btn btn-sm btn-magenta" (click)="changeStatus(t.id, 'Done')">Done</button>

        <button class="btn btn-sm btn-danger" (click)="askDelete(t.id)">Delete</button>

        <button class="btn btn-sm btn-secondary" (click)="openTask(t)">View</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ELIMINAR -->
<div *ngIf="taskToDelete" class="modal-backdrop-custom">
  <div class="modal-custom">
    <h5>Confirm Delete</h5>
    <p>Are you sure you want to delete this task?</p>

    <div class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn btn-secondary" (click)="cancelDelete()">Cancel</button>

      <button class="btn btn-danger" (click)="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<!-- MODAL VER TAREA -->
<div *ngIf="selectedTask" class="modal-backdrop-custom">
  <div class="modal-custom text-center">
    <!-- CONTENEDOR INTERNO -->
    <div class="modal-inner">
      <h4 class="mb-3">{{ selectedTask.title }}</h4>

      <p><strong>Status:</strong> {{ selectedTask.status }}</p>

      <p class="mt-3"><strong>Description:</strong></p>
      <p>
        {{ selectedTask.description || 'No description' }}
      </p>
    </div>

    <button class="btn btn-secondary mt-3" (click)="closeTask()">Close</button>
  </div>
</div>
